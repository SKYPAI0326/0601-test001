<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商務會議議程計時器</title>
    <style>
        :root {
            --primary-bg: #fdfcfb;
            --card-bg: #ffffff;
            --text-main: #34495e;
            --text-light: #95a5a6;
            --accent-blue: #6d82a3; /* 接近圖片中的按鈕顏色 */
            --accent-red: #e74c3c;
            --border-color: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 { font-size: 1.5rem; font-weight: 600; color: #444; margin-bottom: 8px; }
        .subtitle { color: var(--text-light); font-size: 0.9rem; letter-spacing: 1px; }

        /* 設定介面 (Setup UI) */
        .setup-section h2 {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .agenda-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }

        input[type="number"] {
            width: 80px;
            padding: 12px 5px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
        }

        .btn-remove {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-remove:hover { border-color: var(--accent-red); color: var(--accent-red); }

        .btn-add {
            background: none;
            border: 1px dashed var(--border-color);
            color: var(--text-light);
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-add:hover { background: #f9f9f9; border-color: var(--accent-blue); color: var(--accent-blue); }

        .btn-main {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-main:hover { filter: brightness(1.1); }

        /* 執行介面 (Timer UI) */
        #timerInterface { display: none; text-align: center; }

        .current-task-label { font-size: 1.5rem; color: var(--text-light); margin-bottom: 10px; }
        .current-task-name { font-size: 3rem; font-weight: 700; margin-bottom: 20px; }

        .big-timer {
            font-size: 12rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
            line-height: 1;
        }

        .warning { color: var(--accent-red); }

        .progress-list {
            margin-top: 40px;
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: var(--text-light);
        }

        .progress-row.active { color: var(--accent-blue); font-weight: bold; }
        .progress-row.done { text-decoration: line-through; opacity: 0.5; }

        .timer-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-control {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-control:hover { background: #f5f5f5; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="subtitle">PRAC 1-3 • INTERACTIVE TOOL</div>
        <h1>會議議程計時器</h1>
    </header>

    <!-- 設定模式 -->
    <div id="setupInterface" class="setup-section">
        <h2>STEP 1 • 設定今天的議程</h2>
        <div id="agendaList">
            <!-- 預設項目 -->
            <div class="agenda-item">
                <input type="text" value="開場與簡報目標" placeholder="議程名稱">
                <input type="number" value="5" min="1">
                <button class="btn-remove" onclick="removeRow(this)">×</button>
            </div>
            <div class="agenda-item">
                <input type="text" value="業務進度報告" placeholder="議程名稱">
                <input type="number" value="10" min="1">
                <button class="btn-remove" onclick="removeRow(this)">×</button>
            </div>
            <div class="agenda-item">
                <input type="text" value="問題討論" placeholder="議程名稱">
                <input type="number" value="15" min="1">
                <button class="btn-remove" onclick="removeRow(this)">×</button>
            </div>
            <div class="agenda-item">
                <input type="text" value="行動項目確認" placeholder="議程名稱">
                <input type="number" value="5" min="1">
                <button class="btn-remove" onclick="removeRow(this)">×</button>
            </div>
        </div>
        <button class="btn-add" onclick="addRow()">+ 新增議程項目</button>
        <button class="btn-main" onclick="startMeeting()">建立計時器並開始</button>
    </div>

    <!-- 執行模式 -->
    <div id="timerInterface">
        <div class="current-task-label">目前議程</div>
        <div id="activeTaskName" class="current-task-name">載入中...</div>
        
        <div id="display" class="big-timer">00:00</div>

        <div class="timer-controls">
            <button id="pauseBtn" class="btn-control" onclick="togglePause()">暫停</button>
            <button class="btn-control" onclick="nextTask()">下一個項目</button>
            <button class="btn-control" onclick="resetAll()">重新設定</button>
        </div>

        <div id="miniAgenda" class="progress-list">
            <!-- 動態填入剩餘清單 -->
        </div>
    </div>
</div>

<script>
    let agendas = [];
    let currentIndex = 0;
    let timeLeft = 0;
    let timerId = null;
    let isPaused = false;
    let audioCtx = null;

    function addRow() {
        const container = document.getElementById('agendaList');
        const div = document.createElement('div');
        div.className = 'agenda-item';
        div.innerHTML = `
            <input type="text" placeholder="議程名稱">
            <input type="number" value="10" min="1">
            <button class="btn-remove" onclick="removeRow(this)">×</button>
        `;
        container.appendChild(div);
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll('.agenda-item');
        if (rows.length > 1) {
            btn.parentElement.remove();
        }
    }

    function playSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.8);
    }

    function startMeeting() {
        const rows = document.querySelectorAll('.agenda-item');
        agendas = [];
        rows.forEach(row => {
            const name = row.querySelector('input[type="text"]').value || "未命名項目";
            const mins = parseInt(row.querySelector('input[type="number"]').value) || 1;
            agendas.push({ name, mins, seconds: mins * 60 });
        });

        if (agendas.length === 0) return;

        document.getElementById('setupInterface').style.display = 'none';
        document.getElementById('timerInterface').style.display = 'block';
        
        currentIndex = 0;
        loadTask(0);
    }

    function loadTask(index) {
        if (index >= agendas.length) {
            finishMeeting();
            return;
        }
        currentIndex = index;
        timeLeft = agendas[index].seconds;
        document.getElementById('activeTaskName').textContent = agendas[index].name;
        updateMiniAgenda();
        renderTime();
        
        if (timerId) clearInterval(timerId);
        isPaused = false;
        document.getElementById('pauseBtn').textContent = "暫停";
        startCountdown();
    }

    function startCountdown() {
        timerId = setInterval(() => {
            if (!isPaused) {
                timeLeft--;
                renderTime();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    playSound();
                    setTimeout(() => nextTask(), 1500);
                }
            }
        }, 1000);
    }

    function renderTime() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        const display = document.getElementById('display');
        display.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        
        // 剩餘 5 分鐘或低於 20% 時間時變紅
        if (timeLeft <= 300) {
            display.classList.add('warning');
        } else {
            display.classList.remove('warning');
        }
    }

    function updateMiniAgenda() {
        const container = document.getElementById('miniAgenda');
        container.innerHTML = '<h3>後續議程</h3>';
        agendas.forEach((task, idx) => {
            const row = document.createElement('div');
            row.className = `progress-row ${idx === currentIndex ? 'active' : ''} ${idx < currentIndex ? 'done' : ''}`;
            row.innerHTML = `<span>${task.name}</span><span>${task.mins}m</span>`;
            container.appendChild(row);
        });
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pauseBtn').textContent = isPaused ? "繼續" : "暫停";
    }

    function nextTask() {
        clearInterval(timerId);
        loadTask(currentIndex + 1);
    }

    function finishMeeting() {
        document.getElementById('activeTaskName').textContent = "會議結束";
        document.getElementById('display').textContent = "DONE";
        document.getElementById('display').classList.remove('warning');
        clearInterval(timerId);
    }

    function resetAll() {
        clearInterval(timerId);
        document.getElementById('setupInterface').style.display = 'block';
        document.getElementById('timerInterface').style.display = 'none';
    }
</script>

</body>
</html>
