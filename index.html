<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程報價試算器 - 黑金奢華版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0a0a0a;              /* 深邃曜石黑 */
      --primary-color: #d4af37;         /* 經典香檳金 */
      --primary-hover: #f3cf65;        /* 亮金 */
      --text-dark: #f5f5f5;            /* 溫和白 */
      --text-muted: #a09e9a;           /* 質感霧灰 */
      --border-color: #2c2a25;         /* 暗金調深色邊框 */
      --card-bg: #141414;              /* 碳黑卡片背景 */
      --warning-color: #ff6b6b;        /* 警示紅 */
      --warning-bg: #2d1919;           /* 暗紅警示背景 */
      --gold-glow: rgba(212, 175, 55, 0.2); /* 金色光暈 */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: var(--card-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9), 0 0 20px rgba(212, 175, 55, 0.08);
      border: 1px solid var(--border-color);
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .header {
      background: linear-gradient(135deg, #1c1c1c, #0a0a0a);
      color: var(--primary-color);
      padding: 28px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 10px rgba(212, 175, 55, 0.2);
    }

    .calculator-form {
      padding: 28px 24px;
    }

    .input-group {
      margin-bottom: 22px;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-dark);
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.05rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background-color: #1e1e1e;
      font-family: inherit;
      color: var(--text-dark);
      transition: all 0.3s ease;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary-color);
      background-color: #242424;
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .input-wrapper .suffix {
      position: absolute;
      right: 16px;
      color: var(--primary-color);
      opacity: 0.85;
      font-size: 0.9rem;
      pointer-events: none;
      font-weight: 500;
    }

    .input-wrapper input {
      padding-right: 54px; /* 為右側單位預留空間 */
    }

    .warning-banner {
      display: none;
      background-color: var(--warning-bg);
      color: var(--warning-color);
      border: 1px solid rgba(255, 107, 107, 0.25);
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .warning-banner.active {
      display: flex;
    }

    .results-section {
      background-color: #0e0e0e;
      border-top: 1px solid var(--border-color);
      padding: 28px 24px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .result-row .value-normal {
      color: #e0e0e0;
      font-weight: 500;
    }

    .result-row.total-row {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px dashed var(--border-color);
      color: var(--text-dark);
    }

    .result-row.total-row .label {
      font-weight: 700;
      font-size: 1.15rem;
    }

    .result-row.total-row .value {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primary-color);
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
      letter-spacing: 0.5px;
    }

    /* 隱藏 Chrome/Safari/Edge/Firefox 的數值箭頭 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>課程報價試算器</h1>
    </div>

    <div class="calculator-form">
      <!-- 驗證提示 -->
      <div id="warningBanner" class="warning-banner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>折扣率過高，請確認</span>
      </div>

      <!-- 輸入欄位 -->
      <div class="input-group">
        <label for="students">學員人數</label>
        <div class="input-wrapper">
          <input type="number" id="students" min="0" placeholder="0" autocomplete="off">
          <span class="suffix">人</span>
        </div>
      </div>

      <div class="input-group">
        <label for="hours">上課時數</label>
        <div class="input-wrapper">
          <input type="number" id="hours" min="0" step="any" placeholder="0" autocomplete="off">
          <span class="suffix">小時</span>
        </div>
      </div>

      <div class="input-group">
        <label for="rate">每小時單價 (NT$)</label>
        <div class="input-wrapper">
          <input type="number" id="rate" min="0" placeholder="0" autocomplete="off">
          <span class="suffix">元/時</span>
        </div>
      </div>

      <div class="input-group">
        <label for="discount">折扣率 (%)</label>
        <div class="input-wrapper">
          <input type="number" id="discount" min="0" max="100" step="any" placeholder="0" autocomplete="off">
          <span class="suffix">%</span>
        </div>
      </div>
    </div>

    <div class="results-section">
      <div class="result-row">
        <span>小計</span>
        <span id="subtotalDisplay" class="value-normal">NT$ 0</span>
      </div>
      <div class="result-row">
        <span>折扣金額</span>
        <span id="discountDisplay" class="value-normal">NT$ 0</span>
      </div>
      <div class="result-row total-row">
        <span class="label">總計</span>
        <span class="value" id="totalDisplay">NT$ 0</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // 獲取 DOM 節點
      const inputs = {
        students: document.getElementById('students'),
        hours: document.getElementById('hours'),
        rate: document.getElementById('rate'),
        discount: document.getElementById('discount')
      };

      const displays = {
        subtotal: document.getElementById('subtotalDisplay'),
        discount: document.getElementById('discountDisplay'),
        total: document.getElementById('totalDisplay'),
        warning: document.getElementById('warningBanner')
      };

      // 核心試算功能
      function calculate() {
        // 安全獲取數值（空字串或無效值自動降級為 0）
        const students = Math.max(0, parseInt(inputs.students.value, 10)) || 0;
        const hours = Math.max(0, parseFloat(inputs.hours.value)) || 0;
        const rate = Math.max(0, parseInt(inputs.rate.value, 10)) || 0;
        const discountRate = Math.max(0, parseFloat(inputs.discount.value)) || 0;

        // 金額公式運算
        const subtotal = students * hours * rate;
        const discountAmount = subtotal * (discountRate / 100);
        const total = Math.max(0, subtotal - discountAmount);

        // 驗證折扣率是否超過 30%
        if (discountRate > 30) {
          displays.warning.classList.add('active');
        } else {
          displays.warning.classList.remove('active');
        }

        // 格式化輸出金額 (包含千分位)
        displays.subtotal.textContent = `NT$ ${Math.round(subtotal).toLocaleString('zh-TW')}`;
        displays.discount.textContent = `NT$ ${Math.round(discountAmount).toLocaleString('zh-TW')}`;
        displays.total.textContent = `NT$ ${Math.round(total).toLocaleString('zh-TW')}`;
      }

      // 監聽所有輸入框變更
      Object.values(inputs).forEach(input => {
        input.addEventListener('input', calculate);
      });

      // 初始化頁面數值
      calculate();
    })();
  </script>
</body>
</html>
