<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程報價試算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f5f3ee;
      --primary-color: #6b7fa3;
      --primary-hover: #536485;
      --text-dark: #2d2d2d;
      --text-muted: #6e6a64;
      --border-color: #e2ded5;
      --card-bg: #ffffff;
      --warning-color: #c97a7a;
      --warning-bg: #fdf3f3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: var(--card-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .header {
      background-color: var(--primary-color);
      color: #ffffff;
      padding: 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .calculator-form {
      padding: 24px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-dark);
      font-size: 0.95rem;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: #faf9f6;
      font-family: inherit;
      color: var(--text-dark);
      transition: all 0.2s ease;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary-color);
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(107, 127, 163, 0.15);
    }

    .input-wrapper .suffix {
      position: absolute;
      right: 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .input-wrapper input {
      padding-right: 48px; /* 為後綴留空 */
    }

    /* 驗證提示框 */
    .warning-banner {
      display: none;
      background-color: var(--warning-bg);
      color: var(--warning-color);
      border: 1px solid rgba(199, 122, 122, 0.3);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      align-items: center;
      gap: 8px;
    }

    .warning-banner.active {
      display: flex;
    }

    /* 輸出區塊 */
    .results-section {
      background-color: #faf9f6;
      border-top: 1px solid var(--border-color);
      padding: 24px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .result-row.total-row {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px dashed var(--border-color);
      color: var(--text-dark);
    }

    .result-row.total-row .label {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .result-row.total-row .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    /* 移除 input[type=number] 的箭頭 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>課程報價試算器</h1>
    </div>

    <div class="calculator-form">
      <!-- 驗證提示 -->
      <div id="warningBanner" class="warning-banner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>折扣率過高，請確認</span>
      </div>

      <!-- 輸入群組 -->
      <div class="input-group">
        <label for="students">學員人數</label>
        <div class="input-wrapper">
          <input type="number" id="students" min="0" placeholder="0" autocomplete="off">
          <span class="suffix">人</span>
        </div>
      </div>

      <div class="input-group">
        <label for="hours">上課時數</label>
        <div class="input-wrapper">
          <input type="number" id="hours" min="0" step="any" placeholder="0" autocomplete="off">
          <span class="suffix">小時</span>
        </div>
      </div>

      <div class="input-group">
        <label for="rate">每小時單價 (NT$)</label>
        <div class="input-wrapper">
          <input type="number" id="rate" min="0" placeholder="0" autocomplete="off">
          <span class="suffix">元/時</span>
        </div>
      </div>

      <div class="input-group">
        <label for="discount">折扣率 (%)</label>
        <div class="input-wrapper">
          <input type="number" id="discount" min="0" max="100" step="any" placeholder="0" autocomplete="off">
          <span class="suffix">%</span>
        </div>
      </div>
    </div>

    <!-- 輸出顯示 -->
    <div class="results-section">
      <div class="result-row">
        <span>小計</span>
        <span id="subtotalDisplay">NT$ 0</span>
      </div>
      <div class="result-row">
        <span>折扣金額</span>
        <span id="discountDisplay">NT$ 0</span>
      </div>
      <div class="result-row total-row">
        <span class="label">總計</span>
        <span class="value" id="totalDisplay">NT$ 0</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // 取得 DOM 節點
      const inputs = {
        students: document.getElementById('students'),
        hours: document.getElementById('hours'),
        rate: document.getElementById('rate'),
        discount: document.getElementById('discount')
      };

      const displays = {
        subtotal: document.getElementById('subtotalDisplay'),
        discount: document.getElementById('discountDisplay'),
        total: document.getElementById('totalDisplay'),
        warning: document.getElementById('warningBanner')
      };

      // 核心計算與邏輯處理
      function calculate() {
        // 驗證並格式化輸入 (空值或非數值皆視為 0)
        const students = Math.max(0, parseInt(inputs.students.value, 10)) || 0;
        const hours = Math.max(0, parseFloat(inputs.hours.value)) || 0;
        const rate = Math.max(0, parseInt(inputs.rate.value, 10)) || 0;
        const discountRate = Math.max(0, parseFloat(inputs.discount.value)) || 0;

        // 計算邏輯
        const subtotal = students * hours * rate;
        const discountAmount = subtotal * (discountRate / 100);
        const total = Math.max(0, subtotal - discountAmount);

        // 折扣警告機制 (折扣率 > 30%)
        if (discountRate > 30) {
          displays.warning.classList.add('active');
        } else {
          displays.warning.classList.remove('active');
        }

        // 渲染至畫面並格式化千分位
        displays.subtotal.textContent = `NT$ ${Math.round(subtotal).toLocaleString('zh-TW')}`;
        displays.discount.textContent = `NT$ ${Math.round(discountAmount).toLocaleString('zh-TW')}`;
        displays.total.textContent = `NT$ ${Math.round(total).toLocaleString('zh-TW')}`;
      }

      // 綁定事件監聽器至所有輸入框
      Object.values(inputs).forEach(input => {
        input.addEventListener('input', calculate);
      });

      // 初始化計算
      calculate();
    })();
  </script>
</body>
</html>
